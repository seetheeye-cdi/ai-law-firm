{% extends "base.html" %}
{% block title %}Login - AI Law Firm{% endblock %}

{% block navbar %}
<nav class="navbar">
    <a class="navbar-brand" href="/web/login">AI Law Firm</a>
</nav>
{% endblock %}

{% block content %}
<div style="max-width: 400px; margin: 4rem auto;">
    <div class="card" style="text-align: center;">
        <h2 style="margin-bottom: 0.5rem;">Login</h2>
        <p style="color: var(--text-light); margin-bottom: 1.5rem; font-size: 0.9rem;">API Key를 입력하세요</p>

        {% if error %}
        <div class="flash flash-error" style="text-align: left;">{{ error }}</div>
        {% endif %}

        <form method="POST" action="/web/login">
            <div class="form-group">
                <input type="password" name="api_key" placeholder="API Key" required autofocus>
            </div>
            <button type="submit" class="btn btn-primary" style="width: 100%; padding: 0.7rem;">Login</button>
        </form>
    </div>
</div>
{% endblock %}
